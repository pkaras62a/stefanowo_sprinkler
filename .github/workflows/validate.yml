name: ESPHome Validate

on:
  push:
    paths:
      - '**.yaml'
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install ESPHome
        run: pip install esphome

      - name: Auto-generate Secrets and Validate
        run: |
          # 1. Search all YAML files for "!secret <keyname>"
          # 2. Extract the keyname
          # 3. Format it as "keyname: dummy"
          # 4. Save to secrets.yaml
          
          echo "--- Generating dummy secrets.yaml ---"
          grep -rh "!secret" . \
            --exclude="secrets.yaml" \
            --exclude-dir=".git" \
            --exclude-dir=".github" | \
            sed 's/.*!secret //' | \
            awk '{print $1 ": dummy12345"}' | \
            sort -u > secrets.yaml
          
          echo "Generated keys:"
          cat secrets.yaml
          echo "-------------------------------------"
          
          # Run validation on all top-level ESPHome configs
          for f in *.yaml; do
            if [[ "$f" != "secrets.yaml" ]]; then
              echo "Validating $f..."
              esphome config "$f"
            fi
          done
