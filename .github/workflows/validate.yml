name: ESPHome Validate

on:
  push:
    paths:
      - '**.yaml'
  pull_request:

# This forces the runner to use Node 24 for all actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        # Updated to v5 (or latest available in 2026)
        uses: actions/checkout@v5

      - name: Set up Python
        # Updated to v6 (or latest available in 2026)
        uses: actions/setup-python@v6
        with:
          python-version: '3.12' # Moving to 3.12 is also recommended for 2026

      - name: Install ESPHome
        run: pip install esphome

      - name: Validate ESPHome Config
        run: |
          if [ ! -f secrets.yaml ]; then
            echo "wifi_ssid: dummy" > secrets.yaml
            echo "wifi_password: dummy" >> secrets.yaml
          fi
          
          for f in *.yaml; do
            if [[ "$f" != "secrets.yaml" ]]; then
              esphome config "$f"
            fi
          done
